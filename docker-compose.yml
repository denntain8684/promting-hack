services:
  prompting-hack:
    build: .
    container_name: prompting-hack
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-PLACEHOLDER}
      - NODE_ENV=production
    networks:
      - denntains-net

networks:
  denntains-net:
    external: true
    name: denntainshome_denntains-net
